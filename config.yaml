# PubMed RNase III Daily Digest 配置文件

pubmed:
  # PubMed E-utilities 基础配置
  db: pubmed
  retmax: 300           # 每次最多抓取 300 篇
  sort: pub+date

  # 基础检索式：以 RNase III / 双链 RNA 切割核糖核酸酶为核心
  # 这里只是一个起点，你可以在日后根据需要自行微调。
  base_query: >
    (("RNase III"[Title/Abstract]) OR ("RNaseIII"[Title/Abstract]) OR
     ("ribonuclease III"[Title/Abstract]) OR ("double-stranded RNA-specific ribonuclease"[Title/Abstract]) OR
     ("dsRNA-specific ribonuclease"[Title/Abstract]) OR ("orthodox RNase III"[Title/Abstract]) OR
     ("canonical RNase III"[Title/Abstract]) OR ("Class I RNase III"[Title/Abstract]) OR
     ("Class II RNase III"[Title/Abstract]) OR ("Class III RNase III"[Title/Abstract]) OR
     ("Class IV RNase III"[Title/Abstract]) OR ("E. coli RNase III"[Title/Abstract]) OR
     ("Escherichia coli RNase III"[Title/Abstract]) OR
     ((Rnt1p[Title/Abstract] OR RNT1[Title/Abstract]) AND (ribonuclease[Title/Abstract] OR "RNase III"[Title/Abstract] OR dsRNA[Title/Abstract])) OR
     (Pac1[Title/Abstract] AND (ribonuclease[Title/Abstract] OR "RNase III"[Title/Abstract] OR dsRNA[Title/Abstract] OR Schizosaccharomyces[Title/Abstract])) OR
     (Drosha[Title/Abstract] AND ("RNase III"[Title/Abstract] OR cleavage[Title/Abstract] OR processing[Title/Abstract] OR substrate[Title/Abstract] OR catalytic[Title/Abstract] OR structure[Title/Abstract] OR engineering[Title/Abstract])) OR
     (Dicer[Title/Abstract] AND ("RNase III"[Title/Abstract] OR cleavage[Title/Abstract] OR processing[Title/Abstract] OR substrate[Title/Abstract] OR catalytic[Title/Abstract] OR structure[Title/Abstract] OR engineering[Title/Abstract])) OR
     ("Mini-III"[Title/Abstract]) OR (MiniIII[Title/Abstract]) OR
     (("double-stranded RNA"[Title/Abstract] OR dsRNA[Title/Abstract]) AND (ribonuclease[Title/Abstract] OR nuclease[Title/Abstract]) AND (cleavage[Title/Abstract] OR processing[Title/Abstract] OR catalysis[Title/Abstract])))

  # 时间窗口：最近 30 天（由代码层面再次过滤保证）
  # 在 E-utilities 查询中也会加上类似 "last 30 days"[dp]


# 每日最大论文数量
max_papers_per_day: 5


# DeepSeek API 配置
deepseek:
  model: deepseek-chat
  max_tokens: 500
  temperature: 0.2


# 偏好配置: 用于 DeepSeek 打分时描述你的兴趣
preference:
  profile: >
    我想系统了解 RNase III 相关研究，重点关注主要切割双链 RNA 的核糖核酸酶及其机制、工程化改造和应用。
    优先感兴趣的酶类和系统包括但不限于：
    1）Class I orthodox/canonical RNase III，如 E. coli RNase III、出芽酵母 Rnt1p（RNT1）和裂殖酵母 Pac1；
    2）Class II RNase III（Drosha）、Class III RNase III（Dicer）、Class IV RNase III；
    3）Mini-III 以及其它主要切割双链 RNA 的核糖核酸酶或相关 RNA 加工系统。

    重点关注的问题包括：
    1）底物识别机制，例如 dsRNA 结构、茎环、末端特征、序列/结构偏好、辅助结构域或蛋白因子的贡献；
    2）切割催化机制，例如 RNase III 结构域构象、二聚化、金属离子依赖性、活性位点和切割位点选择；
    3）切后产物释放、产物长度/末端特征、RNA 周转、RNA 加工与调控机制；
    4）工程化改造与应用，例如底物特异性重编程、活性/稳定性/表达优化、结构域融合、可编程 RNA 切割、RNA 调控工具、诊断或生物技术应用；
    5）对 RNase III 蛋白本身进行优化、定向进化、理性设计、结构解析和功能验证的研究。

    更偏好兼具机制深度和可工程化价值的工作，尤其是能够解释底物识别、催化切割、产物释放或 RNA 调控逻辑，
    并对蛋白改造或工具开发有启发的研究。对于纯临床描述、与双链 RNA 切割机制或 RNase III 工程化关系较弱的工作，应当给出较低分。


# 站点配置
site:
  title: "🧬 PubMed RNase III Daily Digest"
  description: "最近 30 天内 RNase III / 双链 RNA 切割核糖核酸酶相关论文精选"
  author: "Graduate Student"
  base_url: ""  # 部署后可填写 GitHub Pages URL


# 时区设置 (用于显示日期)
timezone: Asia/Shanghai
